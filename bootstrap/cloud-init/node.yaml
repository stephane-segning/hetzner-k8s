#cloud-config

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release
  - htop
  - jq
  - tree
  - fail2ban
  - unzip

write_files:
  - path: /etc/rancher/k3s/config.yaml
    content: |
%{ if k3s_role == "control-plane" ~}
%{ if etcd_s3_enabled ~}
      etcd-s3: true
      etcd-s3-config-secret: ${etcd_s3_config_secret_name}
%{ endif ~}
%{ else ~}
      {}
%{ endif ~}
    permissions: '0600'

  - path: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    permissions: '0644'

  - path: /etc/sysctl.d/90-kubernetes.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
    permissions: '0644'

  - path: /opt/k3s-bootstrap.sh
    content: |
      #!/bin/bash
      set -euo pipefail
      
      LOG="/var/log/k3s-bootstrap.log"
      
      log() {
          echo "$(date '+%Y-%m-%d %H:%M:%S') - $1" | tee -a "$LOG" >&2
      }

      log "Starting k3s bootstrap"

      K3S_TOKEN="${k3s_token}"
      K3S_ROLE="${k3s_role}"
      BOOTSTRAP_SERVER_IP="${bootstrap_server_ip}"
      INSTALL_K3S_VERSION="${k3s_version}"
      NODE_PRIVATE_IP="${node_private_ip}"

      # Bring up the Hetzner private network interface.
      #
      # cloud-init's Hetzner datasource normally writes a netplan entry for
      # both NICs, but when the private network attachment races with cloud-
      # init's network rendering, the private NIC is missing from netplan
      # and stays DOWN. The k3s server then cannot bind --node-ip/2380 to
      # the configured private address. Detect that case and write our own
      # netplan entry by matching the NIC's MAC.
      ensure_private_nic() {
          local expected_ip="$1"

          if ip -4 -o addr show 2>/dev/null | awk '{print $4}' | cut -d/ -f1 | grep -qx "$expected_ip"; then
              log "Private IP $expected_ip already bound"
              return 0
          fi

          local nic mac
          for attempt in $(seq 1 60); do
              # Pick the first link that is not loopback, not eth0/the public
              # NIC, and not a virtual interface (docker, cilium, veth, etc.).
              # `|| true` keeps the retry loop alive when grep finds no match
              # under `set -o pipefail` (the exact race this function exists
              # to handle: NIC not yet attached on the first attempts).
              nic=$(ip -o link show 2>/dev/null \
                  | awk -F': ' '{print $2}' \
                  | awk -F'@' '{print $1}' \
                  | { grep -vE '^(lo|eth0|docker.*|cni.*|cilium.*|veth.*|kube-.*|flannel.*)$' || true; } \
                  | head -1)
              [ -n "$nic" ] && break
              log "Waiting for private NIC to appear (attempt $attempt)"
              sleep 2
          done

          if [ -z "$nic" ]; then
              log "ERROR: no private NIC found after 120s"
              return 1
          fi

          mac=$(ip link show "$nic" | awk '/link\/ether/ {print $2}')
          log "Configuring private NIC $nic (mac=$mac) via netplan"

          # Built via printf to avoid bash heredoc / YAML literal-block
          # indentation conflicts (the bootstrap script lives inside cloud-
          # init's content: | block where every line must share the parent
          # indent, but heredoc bodies must start at column 1).
          {
              printf 'network:\n'
              printf '  version: 2\n'
              printf '  ethernets:\n'
              printf '    %s:\n' "$nic"
              printf '      match:\n'
              printf '        macaddress: "%s"\n' "$mac"
              printf '      dhcp4: true\n'
              printf '      set-name: "%s"\n' "$nic"
          } > /etc/netplan/60-private.yaml
          chmod 0600 /etc/netplan/60-private.yaml

          # Generate then apply so we surface parser errors via journal
          netplan generate
          netplan apply

          for attempt in $(seq 1 60); do
              if ip -4 -o addr show "$nic" 2>/dev/null | awk '{print $4}' | cut -d/ -f1 | grep -qx "$expected_ip"; then
                  log "Private IP $expected_ip is up on $nic"
                  return 0
              fi
              sleep 2
          done

          log "ERROR: private IP $expected_ip never appeared on $nic after 120s"
          return 1
      }

      ensure_private_nic "$NODE_PRIVATE_IP"

      # Kubernetes nodes should not run with swap enabled unless NodeSwap
      # is explicitly designed and tested for the cluster.
      swapoff -a || true
      sed -i.bak '/\sswap\s/s/^/# /' /etc/fstab || true
      rm -f /etc/fstab.bak
      systemctl mask swap.target >/dev/null 2>&1 || true

      modprobe overlay || true
      modprobe br_netfilter || true
      sysctl --system >/dev/null 2>&1 || true

      if systemctl is-active --quiet k3s || systemctl is-active --quiet k3s-agent; then
          log "k3s already active, skipping"
          exit 0
      fi

      if [ "$INSTALL_K3S_VERSION" != "latest" ]; then
          export INSTALL_K3S_VERSION
      fi
      
      if [ "$K3S_ROLE" = "control-plane" ]; then
%{ if initialize_cluster ~}
%{ if restore_from_s3 ~}
          # Sentinel-based idempotency: if a prior cloud-init run already
          # completed the cluster-reset-restore, just start k3s and exit.
          # Otherwise we would attempt a second --cluster-reset against an
          # already-populated etcd, which moves the live data aside and
          # rewrites it from the snapshot. That's the wrong behavior on a
          # reboot of a healthy node.
          RECOVERY_SENTINEL=/var/lib/rancher/k3s/.recovery-restored
          if [ -f "$RECOVERY_SENTINEL" ]; then
              log "Recovery sentinel present at $RECOVERY_SENTINEL; restore already completed, starting k3s"
              systemctl enable k3s >/dev/null 2>&1 || true
              systemctl start k3s
              exit 0
          fi

          log "Restoring bootstrap control-plane from S3 snapshot ${restore_snapshot_name}"

          # Install k3s with the normal server flags, but DO NOT start AND
          # DO NOT enable the systemd unit. SKIP_ENABLE is the safety net: if
          # this script fails after the install step but before cluster-reset
          # completes, a reboot of the node must NOT auto-bring-up an empty
          # k3s. That's the failure mode that left us with a fresh empty
          # cluster joined by every node. We only enable the unit at the very
          # end, after cluster-reset has returned 0.
          curl -sfL https://get.k3s.io | INSTALL_K3S_SKIP_START=true INSTALL_K3S_SKIP_ENABLE=true INSTALL_K3S_EXEC="server" sh -s - \
            --token "$K3S_TOKEN" \
            --cluster-init \
            --node-ip "$NODE_PRIVATE_IP" \
            --advertise-address "$NODE_PRIVATE_IP" \
            --etcd-snapshot-schedule-cron "${etcd_snapshot_schedule_cron}" \
            --etcd-snapshot-retention ${etcd_snapshot_retention} \
%{ if etcd_snapshot_compress ~}
            --etcd-snapshot-compress \
%{ endif ~}
%{ if etcd_s3_enabled ~}
            --etcd-s3 \
            --etcd-s3-config-secret "${etcd_s3_config_secret_name}" \
%{ endif ~}
            --kubelet-arg cloud-provider=external \
            --node-taint "node-role.kubernetes.io/control-plane=true:NoSchedule" \
            --disable-cloud-controller \
            --disable traefik \
            --disable servicelb \
            --disable local-storage \
            --disable-network-policy \
            --flannel-backend=none \
            --write-kubeconfig-mode "0644"%{ if extra_server_args != "" } \
            ${extra_server_args}%{ endif }

          # The in-cluster k3s-etcd-snapshot-s3-config Secret is not available
          # during restore (it lives in the etcd we are restoring), so S3
          # creds arrive inline as shell variables. Inline avoids the
          # heredoc/YAML-literal-block indentation conflict, and k3s would
          # expose them as CLI flags anyway, so a 0600 file would not have
          # hidden them from `ps`.
          ETCD_S3_ACCESS_KEY='${replace(etcd_s3_access_key_id, "'", "'\\''")}'
          ETCD_S3_SECRET_KEY='${replace(etcd_s3_secret_access_key, "'", "'\\''")}'
          ETCD_S3_BUCKET='${replace(etcd_s3_bucket, "'", "'\\''")}'
          ETCD_S3_ENDPOINT_RAW='${replace(etcd_s3_endpoint, "'", "'\\''")}'
          ETCD_S3_FOLDER='${replace(etcd_s3_folder, "'", "'\\''")}'
          RESTORE_SNAPSHOT_NAME='${replace(restore_snapshot_name, "'", "'\\''")}'

          # The repo accepts ETCD_S3_ENDPOINT with or without scheme, but
          # mc requires exactly one. Strip any leading scheme so we never
          # produce "https://https://..." when the operator typed a URL.
          ETCD_S3_ENDPOINT="$${ETCD_S3_ENDPOINT_RAW#http://}"
          ETCD_S3_ENDPOINT="$${ETCD_S3_ENDPOINT#https://}"

          S3_SCHEME="https"
%{ if etcd_s3_insecure ~}
          S3_SCHEME="http"
%{ endif ~}
          MC_FLAGS=""
%{ if etcd_s3_skip_ssl_verify ~}
          MC_FLAGS="--insecure"
%{ endif ~}

          SNAPSHOTS_DIR=/var/lib/rancher/k3s/server/db/snapshots
          mkdir -p "$SNAPSHOTS_DIR"
          chmod 0700 "$SNAPSHOTS_DIR"

          log "Installing mc for S3 download"
          curl -fsSLo /usr/local/bin/mc https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod 0755 /usr/local/bin/mc

          # Use a per-run tempdir for mc config so credentials never persist
          # in /root/.mc/config.json after cloud-init exits. The trap fires
          # even if mc or k3s --cluster-reset aborts via `set -e`.
          MC_CONFIG_DIR=$(mktemp -d)
          trap 'rm -rf "$MC_CONFIG_DIR"' EXIT

          # Refuse to proceed if the operator forgot to pass restore_snapshot_name
          # while flipping restore_from_s3=true. The workflow already guards
          # this in Validate restore inputs, but defending here too means a
          # local Terraform apply (break-glass) can't silently no-op.
          if [ -z "$RESTORE_SNAPSHOT_NAME" ]; then
              log "ERROR: restore_from_s3 is true but restore_snapshot_name is empty"
              exit 1
          fi

          # Defensive basename: trim any directory prefix the operator may
          # have pasted (subfolder/x.zip, s3://... URL, absolute path).
          SNAPSHOT_BASENAME="$${RESTORE_SNAPSHOT_NAME##*/}"

          log "Downloading snapshot from $S3_SCHEME://$ETCD_S3_ENDPOINT/$ETCD_S3_BUCKET/$ETCD_S3_FOLDER/$SNAPSHOT_BASENAME"
          /usr/local/bin/mc --config-dir "$MC_CONFIG_DIR" $MC_FLAGS alias set restoresrc \
            "$S3_SCHEME://$ETCD_S3_ENDPOINT" \
            "$ETCD_S3_ACCESS_KEY" "$ETCD_S3_SECRET_KEY" >>"$LOG" 2>&1
          /usr/local/bin/mc --config-dir "$MC_CONFIG_DIR" $MC_FLAGS cp \
            "restoresrc/$ETCD_S3_BUCKET/$ETCD_S3_FOLDER/$SNAPSHOT_BASENAME" \
            "$SNAPSHOTS_DIR/" >>"$LOG" 2>&1

          SNAP_ZIP="$SNAPSHOTS_DIR/$SNAPSHOT_BASENAME"
          if [ ! -f "$SNAP_ZIP" ] || [ ! -s "$SNAP_ZIP" ]; then
              log "ERROR: snapshot did not land as a non-empty file at $SNAP_ZIP"
              exit 1
          fi
          log "Snapshot present at $SNAP_ZIP ($(stat -c %s "$SNAP_ZIP") bytes)"

          # k3s 1.35.x bug: when --cluster-reset-restore-path ends in .zip,
          # the decompress step runs filepath.Join(snapshotsDir, restorePath)
          # against the (already-absolute) restore path. Go's filepath.Join
          # does not strip the leading slash from an absolute second arg, so
          # the doubled prefix /var/lib/.../snapshots/var/lib/.../snapshots/
          # <file> is what k3s tries to open, and it fails. Reference:
          # pkg/etcd/snapshot.go::decompressSnapshot in the k3s tree.
          #
          # The else branch of pkg/etcd/etcd.go::Restore (non-.zip path)
          # uses ClusterResetRestorePath verbatim with no join, no bug. So
          # we pre-decompress the snapshot here and pass the absolute path
          # of the uncompressed file. The inner-archive entry has the same
          # name as the .zip minus the extension, so unzip writes the
          # uncompressed file next to it as <basename minus .zip>.
          case "$SNAPSHOT_BASENAME" in
              *.zip)
                  log "Pre-decompressing $SNAPSHOT_BASENAME to dodge k3s 1.35.x decompressSnapshot path-join bug"
                  unzip -o "$SNAP_ZIP" -d "$SNAPSHOTS_DIR" >>"$LOG" 2>&1
                  SNAP_RESTORE="$SNAPSHOTS_DIR/$${SNAPSHOT_BASENAME%.zip}"
                  ;;
              *)
                  SNAP_RESTORE="$SNAP_ZIP"
                  ;;
          esac

          if [ ! -f "$SNAP_RESTORE" ] || [ ! -s "$SNAP_RESTORE" ]; then
              log "ERROR: uncompressed snapshot not a non-empty file at $SNAP_RESTORE"
              exit 1
          fi
          log "Uncompressed snapshot ready at $SNAP_RESTORE ($(stat -c %s "$SNAP_RESTORE") bytes)"

          # config.yaml has `etcd-s3: true` for the regular service. k3s
          # merges config.yaml into every server invocation including this
          # cluster-reset; pass --etcd-s3=false to force-disable for the
          # one-shot run, otherwise k3s tries to re-fetch via S3.
          log "Running k3s --cluster-reset against $SNAP_RESTORE"
          /usr/local/bin/k3s server \
            --cluster-reset \
            --cluster-reset-restore-path="$SNAP_RESTORE" \
            --token "$K3S_TOKEN" \
            --etcd-s3=false \
            >>"$LOG" 2>&1

          # cluster-reset returned 0 — etcd is now populated with the snapshot
          # data. Mark the sentinel BEFORE enabling so that even if k3s start
          # fails, subsequent cloud-init invocations don't redo the restore.
          touch "$RECOVERY_SENTINEL"
          chmod 0600 "$RECOVERY_SENTINEL"
          log "Cluster reset complete; enabling and starting k3s"
          systemctl enable k3s
          systemctl start k3s
%{ else ~}
          log "Initializing bootstrap control-plane"
          curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server" sh -s - \
            --token "$K3S_TOKEN" \
            --cluster-init \
            --node-ip "$NODE_PRIVATE_IP" \
            --advertise-address "$NODE_PRIVATE_IP" \
            --etcd-snapshot-schedule-cron "${etcd_snapshot_schedule_cron}" \
            --etcd-snapshot-retention ${etcd_snapshot_retention} \
%{ if etcd_snapshot_compress ~}
            --etcd-snapshot-compress \
%{ endif ~}
%{ if etcd_s3_enabled ~}
            --etcd-s3 \
            --etcd-s3-config-secret "${etcd_s3_config_secret_name}" \
%{ endif ~}
            --kubelet-arg cloud-provider=external \
            --node-taint "node-role.kubernetes.io/control-plane=true:NoSchedule" \
            --disable-cloud-controller \
            --disable traefik \
            --disable servicelb \
            --disable local-storage \
            --disable-network-policy \
            --flannel-backend=none \
            --write-kubeconfig-mode "0644"%{ if extra_server_args != "" } \
            ${extra_server_args}%{ endif }
%{ endif ~}
%{ else ~}
          log "Waiting for bootstrap control-plane at $BOOTSTRAP_SERVER_IP"
          until curl -sk "https://$BOOTSTRAP_SERVER_IP:6443/healthz" >/dev/null 2>&1; do
              log "Waiting for control-plane API..."
              sleep 5
          done

          log "Joining additional control-plane"
          curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server" sh -s - \
            --server "https://$BOOTSTRAP_SERVER_IP:6443" \
            --token "$K3S_TOKEN" \
            --node-ip "$NODE_PRIVATE_IP" \
            --advertise-address "$NODE_PRIVATE_IP" \
            --etcd-snapshot-schedule-cron "${etcd_snapshot_schedule_cron}" \
            --etcd-snapshot-retention ${etcd_snapshot_retention} \
%{ if etcd_snapshot_compress ~}
            --etcd-snapshot-compress \
%{ endif ~}
%{ if etcd_s3_enabled ~}
            --etcd-s3 \
            --etcd-s3-config-secret "${etcd_s3_config_secret_name}" \
%{ endif ~}
            --kubelet-arg cloud-provider=external \
            --node-taint "node-role.kubernetes.io/control-plane=true:NoSchedule" \
            --disable-cloud-controller \
            --disable traefik \
            --disable servicelb \
            --disable local-storage \
            --disable-network-policy \
            --flannel-backend=none \
            --write-kubeconfig-mode "0644"%{ if extra_server_args != "" } \
            ${extra_server_args}%{ endif }
%{ endif ~}
      else
          log "Waiting for bootstrap control-plane at $BOOTSTRAP_SERVER_IP"
          until curl -sk "https://$BOOTSTRAP_SERVER_IP:6443/healthz" >/dev/null 2>&1; do
              log "Waiting for control-plane API..."
              sleep 5
          done
          
          log "Joining worker node"
          curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="agent" sh -s - \
            --server "https://$BOOTSTRAP_SERVER_IP:6443" \
            --token "$K3S_TOKEN" \
            --node-ip "$NODE_PRIVATE_IP" \
            --kubelet-arg cloud-provider=external%{ if extra_agent_args != "" } \
            ${extra_agent_args}%{ endif }
      fi
      
      log "k3s bootstrap complete"
    permissions: '0700'

  - path: /etc/systemd/system/k3s-bootstrap.service
    content: |
      [Unit]
      Description=Bootstrap k3s node
      After=network-online.target
      Wants=network-online.target
      
      [Service]
      Type=oneshot
      ExecStart=/opt/k3s-bootstrap.sh
      StandardOutput=journal
      StandardError=journal
      
      [Install]
      WantedBy=multi-user.target
    permissions: '0644'

runcmd:
  - systemctl daemon-reload
  - systemctl enable k3s-bootstrap
  - systemctl start k3s-bootstrap

final_message: |
  k3s node bootstrap complete
  $HOSTNAME: $(hostname)
  IPv4: $(curl -s http://169.254.169.254/hetzner/v1/metadata/public-ipv4)
  Private IP: ${node_private_ip}
