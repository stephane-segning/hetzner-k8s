apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hetzner-platform
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: namespaces
            path: platform/base
            namespace: ""
  template:
    metadata:
      name: '{{name}}'
      labels:
        cluster: hetzner-k8s
        managed-by: applicationset
    spec:
      project: default
      source:
        repoURL: ${REPO_URL}
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: ${CLUSTER_URL}
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hetzner-helm
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: cilium
            chart: cilium
            repoURL: https://helm.cilium.io
            targetRevision: "*"
            namespace: kube-system
            values: platform/helm-values/cilium-values.yaml
            syncWave: "0"
          - name: hccm
            chart: hcloud-cloud-controller-manager
            repoURL: https://charts.hetzner.cloud
            targetRevision: "*"
            namespace: kube-system
            values: platform/helm-values/hcloud-ccm-values.yaml
            syncWave: "10"
          - name: hcloud-csi
            chart: hcloud-csi
            repoURL: https://charts.hetzner.cloud
            targetRevision: "*"
            namespace: kube-system
            values: platform/helm-values/hcloud-csi-values.yaml
            syncWave: "10"
          - name: traefik
            chart: traefik
            repoURL: https://traefik.github.io/charts
            targetRevision: "*"
            namespace: traefik
            values: platform/helm-values/traefik-values.yaml
            syncWave: "20"
          - name: cnpg
            chart: cloudnative-pg
            repoURL: https://cloudnative-pg.github.io/charts
            targetRevision: "*"
            namespace: cnpg-system
            values: platform/helm-values/cnpg-values.yaml
            syncWave: "30"
          - name: redis
            chart: redis
            repoURL: https://charts.bitnami.com/bitnami
            targetRevision: "*"
            namespace: data
            values: platform/helm-values/redis-values.yaml
            syncWave: "30"
          - name: alloy
            chart: alloy
            repoURL: https://grafana.github.io/helm-charts
            targetRevision: "*"
            namespace: observability
            values: platform/helm-values/alloy-values.yaml
            syncWave: "30"
          - name: kube-state-metrics
            chart: kube-state-metrics
            repoURL: https://prometheus-community.github.io/helm-charts
            targetRevision: "*"
            namespace: observability
            values: platform/helm-values/kube-state-metrics-values.yaml
            syncWave: "30"
  template:
    metadata:
      name: '{{name}}'
      labels:
        cluster: hetzner-k8s
        managed-by: applicationset
        type: helm
      annotations:
        argocd.argoproj.io/sync-wave: '{{syncWave}}'
    spec:
      project: default
      sources:
        - repoURL: '{{repoURL}}'
          chart: '{{chart}}'
          targetRevision: '{{targetRevision}}'
          helm:
            valueFiles:
              - '$values/{{values}}'
        - repoURL: ${REPO_URL}
          targetRevision: HEAD
          ref: values
      destination:
        server: ${CLUSTER_URL}
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
