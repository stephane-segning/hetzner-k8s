controller:
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  hcloudToken:
    existingSecret:
      name: hcloud
      key: token
  hcloudVolumeDefaultLocation: nbg1

storageClasses:
  - name: hcloud-volumes
    defaultStorageClass: true
    reclaimPolicy: Delete
