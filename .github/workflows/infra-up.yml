name: Infra Up

on:
  workflow_dispatch:
    inputs:
      allow_control_plane_replacement:
        description: Allow Terraform to delete or replace control-plane servers
        required: true
        default: false
        type: boolean
      restore_from_s3:
        description: Restore etcd from an S3 snapshot on the bootstrap control-plane instead of running --cluster-init. One-shot recovery flag.
        required: false
        default: false
        type: boolean
      restore_snapshot_name:
        description: S3 snapshot filename to restore (required when restore_from_s3=true), e.g. etcd-snapshot-<cluster>-<cp>-<unix>.zip
        required: false
        default: ""
        type: string
      replace_nodes:
        description: 'Comma/space-separated node keys to force-replace this run, e.g. "worker-03" or "worker-01,worker-03". Destroys+recreates each VM so cloud-init re-runs and the node rejoins fresh. Use to recover a wedged worker without a full restore. Control-plane keys also require allow_control_plane_replacement=true.'
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: hetzner-prod-infra
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      TF_DIR: terraform/envs/prod
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_cluster_name: ${{ vars.TF_CLUSTER_NAME || 'hetzner-k8s' }}
      TF_VAR_control_plane_server_type: ${{ vars.TF_CONTROL_PLANE_SERVER_TYPE || 'cpx22' }}
      TF_VAR_worker_server_type: ${{ vars.TF_WORKER_SERVER_TYPE || 'cpx42' }}
      TF_VAR_control_plane_count: ${{ vars.TF_CONTROL_PLANE_COUNT || '3' }}
      TF_VAR_worker_count: ${{ vars.TF_WORKER_COUNT || '2' }}
      TF_VAR_location: ${{ vars.TF_LOCATION || 'nbg1' }}
      TF_VAR_ssh_key_ids: ${{ vars.TF_SSH_KEY_IDS || '[]' }}
      TF_VAR_api_load_balancer_type: ${{ vars.TF_API_LOAD_BALANCER_TYPE || 'lb11' }}
      TF_VAR_api_server_hostname: ${{ vars.TF_API_SERVER_HOSTNAME || '' }}
      TF_VAR_etcd_snapshot_schedule_cron: ${{ vars.TF_ETCD_SNAPSHOT_SCHEDULE_CRON || '0 */6 * * *' }}
      TF_VAR_etcd_snapshot_retention: ${{ vars.TF_ETCD_SNAPSHOT_RETENTION || '14' }}
      TF_VAR_etcd_snapshot_compress: ${{ vars.TF_ETCD_SNAPSHOT_COMPRESS || 'true' }}
      TF_VAR_etcd_s3_enabled: ${{ vars.TF_ETCD_S3_ENABLED || 'true' }}
      TF_VAR_etcd_s3_config_secret_name: ${{ vars.TF_ETCD_S3_CONFIG_SECRET_NAME || 'k3s-etcd-snapshot-s3-config' }}
      TF_VAR_oidc_issuer_url: ${{ vars.TF_OIDC_ISSUER_URL || '' }}
      TF_VAR_oidc_client_id: ${{ vars.TF_OIDC_CLIENT_ID || 'kubernetes' }}
      TF_VAR_oidc_username_claim: ${{ vars.TF_OIDC_USERNAME_CLAIM || 'preferred_username' }}
      TF_VAR_oidc_groups_claim: ${{ vars.TF_OIDC_GROUPS_CLAIM || 'groups' }}
      TF_VAR_oidc_username_prefix: ${{ vars.TF_OIDC_USERNAME_PREFIX || '-' }}
      TF_VAR_oidc_groups_prefix: ${{ vars.TF_OIDC_GROUPS_PREFIX || '' }}
      TF_VAR_restore_from_s3: ${{ inputs.restore_from_s3 && 'true' || 'false' }}
      TF_VAR_restore_snapshot_name: ${{ inputs.restore_snapshot_name || '' }}
      TF_VAR_etcd_s3_access_key_id: ${{ secrets.ETCD_S3_ACCESS_KEY_ID || vars.ETCD_S3_ACCESS_KEY_ID || '' }}
      TF_VAR_etcd_s3_secret_access_key: ${{ secrets.ETCD_S3_SECRET_ACCESS_KEY || vars.ETCD_S3_SECRET_ACCESS_KEY || '' }}
      TF_VAR_etcd_s3_bucket: ${{ secrets.ETCD_S3_BUCKET || vars.ETCD_S3_BUCKET || '' }}
      TF_VAR_etcd_s3_endpoint: ${{ secrets.ETCD_S3_ENDPOINT || vars.ETCD_S3_ENDPOINT || '' }}
      TF_VAR_etcd_s3_region: ${{ secrets.ETCD_S3_REGION || vars.ETCD_S3_REGION || 'eu-central' }}
      TF_VAR_etcd_s3_folder: ${{ secrets.ETCD_S3_FOLDER || vars.ETCD_S3_FOLDER || '' }}
      TF_VAR_etcd_s3_bucket_lookup_type: ${{ secrets.ETCD_S3_BUCKET_LOOKUP_TYPE || vars.ETCD_S3_BUCKET_LOOKUP_TYPE || 'path' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-central
    steps:
      - uses: actions/checkout@v6

      - name: Validate restore inputs
        if: ${{ inputs.restore_from_s3 }}
        env:
          RESTORE_SNAPSHOT_NAME: ${{ inputs.restore_snapshot_name }}
        run: |
          missing=()
          [ -z "$RESTORE_SNAPSHOT_NAME" ] && missing+=("restore_snapshot_name input")
          [ -z "$TF_VAR_etcd_s3_access_key_id" ] && missing+=("ETCD_S3_ACCESS_KEY_ID secret")
          [ -z "$TF_VAR_etcd_s3_secret_access_key" ] && missing+=("ETCD_S3_SECRET_ACCESS_KEY secret")
          [ -z "$TF_VAR_etcd_s3_bucket" ] && missing+=("ETCD_S3_BUCKET secret")
          [ -z "$TF_VAR_etcd_s3_endpoint" ] && missing+=("ETCD_S3_ENDPOINT secret")
          if [ "${#missing[@]}" -gt 0 ]; then
            {
              echo "restore_from_s3=true but required inputs are missing:"
              printf '  - %s\n' "${missing[@]}"
              echo
              echo "Aborting before plan to avoid cloud-init failing on the bootstrap control-plane."
            } | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          {
            echo "Restore mode: ON"
            echo "Snapshot: $RESTORE_SNAPSHOT_NAME"
            echo "Bucket: $TF_VAR_etcd_s3_bucket"
            echo "Endpoint: $TF_VAR_etcd_s3_endpoint"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8

      - name: Write backend config
        run: |
          BACKEND_ENDPOINT='${{ secrets.TF_STATE_ENDPOINT }}'

          if [ -z "$BACKEND_ENDPOINT" ]; then
            echo "TF_STATE_ENDPOINT is empty" >&2
            exit 1
          fi

          case "$BACKEND_ENDPOINT" in
            http://*|https://*) ;;
            *) BACKEND_ENDPOINT="https://$BACKEND_ENDPOINT" ;;
          esac

          cat > backend.hcl <<EOF
          bucket = "${{ secrets.TF_STATE_BUCKET }}"
          key    = "${{ secrets.TF_STATE_KEY }}"
          region = "eu-central"
          endpoints = {
            s3 = "$BACKEND_ENDPOINT"
          }
          skip_requesting_account_id = true
          skip_credentials_validation = true
          skip_metadata_api_check = true
          skip_region_validation = true
          use_path_style = true
          skip_s3_checksum = true
          EOF

      - name: Terraform init
        run: terraform -chdir="$TF_DIR" init -reconfigure -backend-config="$GITHUB_WORKSPACE/backend.hcl"

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform/

      - name: Terraform validate
        run: terraform -chdir="$TF_DIR" validate

      - name: Terraform plan
        env:
          RESTORE_FROM_S3: ${{ inputs.restore_from_s3 && 'true' || 'false' }}
          REPLACE_NODES: ${{ inputs.replace_nodes }}
        run: |
          # When restoring from S3:
          #
          #  - On a FIRST restore (cluster API is NOT reachable), the
          #    non-bootstrap control planes and the workers must all be
          #    re-provisioned. The cps must boot with empty
          #    /var/lib/rancher/k3s/server/db/ and join as fresh etcd members
          #    of the restored cluster; workers may have a pinned CA hash
          #    from a different cluster (e.g. an empty cluster created by a
          #    prior failed restore) and need a fresh agent install against
          #    the restored cluster's CA. Their user_data is byte-identical
          #    between restore and non-restore modes, so Terraform would not
          #    otherwise replace them.
          #
          #  - On a RE-RUN against an already-restored cluster (API
          #    reachable), the non-bootstrap CPs must NOT be replaced. The
          #    sentinel /var/lib/rancher/k3s/.recovery-restored on cp-1
          #    keeps cp-1 from redoing the cluster-reset; if we also tore
          #    down cp-2 and cp-3, etcd would lose quorum (1 of 3 voters)
          #    and never recover because adding new members itself requires
          #    quorum. Only the workers should be touched, in case any of
          #    them have stale CA from a prior empty-cluster era.
          #
          # Reachability of the cluster API LB is our proxy for "is the
          # cluster already restored": 200/401/403 means TLS handshake works
          # and the API is up.
          replace_args=()
          if [ "$RESTORE_FROM_S3" = "true" ]; then
            API_ENDPOINT=$(terraform -chdir="$TF_DIR" output -raw api_server_endpoint 2>/dev/null || true)
            case "$API_ENDPOINT" in
              http://*|https://*) ;;
              *) [ -n "$API_ENDPOINT" ] && API_ENDPOINT="https://$API_ENDPOINT" ;;
            esac

            api_status="000"
            if [ -n "$API_ENDPOINT" ]; then
              api_status=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 5 "$API_ENDPOINT/livez" 2>/dev/null || echo "000")
            fi
            echo "Restore mode: API probe $API_ENDPOINT/livez -> HTTP $api_status"

            cluster_reachable=false
            case "$api_status" in
              200|401|403) cluster_reachable=true ;;
            esac

            if [ "$cluster_reachable" = "true" ]; then
              # Cluster is already restored and healthy. Only force-replace
              # workers (their CA may be from a different cluster era);
              # leave cp-2/cp-3 alone so etcd quorum stays intact.
              while IFS= read -r addr; do
                [ -n "$addr" ] && replace_args+=("-replace=$addr")
              done < <(
                terraform -chdir="$TF_DIR" state list 2>/dev/null \
                  | grep -E '^module\.servers\.hcloud_server\.main\["worker-[0-9]+"\]$' \
                  || true
              )
              {
                echo "Cluster API is reachable; restoring already complete."
                echo "Force-replacing workers only (sparing cp-2/cp-3 to preserve etcd quorum):"
                printf '  - %s\n' "${replace_args[@]}"
              } >> "$GITHUB_STEP_SUMMARY"
            else
              # Cluster API is not reachable. Treat as first restore: replace
              # ALL control planes and ALL workers. There is no quorum to
              # protect (the cluster is gone), so replacing every CP is safe
              # and necessary: cp-1 runs --cluster-reset to restore from the
              # snapshot, cp-2/cp-3 join it fresh, workers join with fresh CA.
              #
              # cp-1 (the bootstrap CP) MUST be replaced explicitly here. We
              # used to rely on its restore-mode user_data differing from
              # normal mode to trigger replacement, but ADR-0013 added
              # ignore_changes=[user_data] on the server, so user_data drift
              # no longer forces a replace. The explicit -replace below
              # bypasses ignore_changes and recreates cp-1 with the current
              # (restore-branch) cloud-init.
              while IFS= read -r addr; do
                [ -n "$addr" ] && replace_args+=("-replace=$addr")
              done < <(
                {
                  terraform -chdir="$TF_DIR" state list 2>/dev/null \
                    | grep -E '^module\.servers\.hcloud_server\.main\["control-plane-[0-9]+"\]$'
                  terraform -chdir="$TF_DIR" state list 2>/dev/null \
                    | grep -E '^module\.servers\.hcloud_server\.main\["worker-[0-9]+"\]$'
                } || true
              )
              {
                echo "Cluster API not reachable (status $api_status); treating as first restore."
                echo "Force-replacing ALL control planes (incl. bootstrap cp-1) and all workers:"
                printf '  - %s\n' "${replace_args[@]}"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          # Operator-requested targeted replacements, independent of restore
          # mode. Lets us recover a single wedged node (e.g. a worker whose
          # host hung) through the supported control surface instead of a
          # console reboot or a local `terraform apply -replace`. Accepts
          # comma/space-separated node keys; both the padded state-key form
          # (worker-03) and the unpadded kubectl-name form (worker-3) work.
          # Each is validated against state and mapped to its hcloud_server
          # address. Control-plane keys land in the plan as a delete and are
          # caught by the "Guard control-plane replacements" step, so they
          # still require allow_control_plane_replacement=true.
          if [ -n "${REPLACE_NODES:-}" ]; then
            requested=$(printf '%s\n' "$REPLACE_NODES" | tr ',' '\n' | tr ' ' '\n' | sed '/^[[:space:]]*$/d')
            while IFS= read -r key; do
              [ -z "$key" ] && continue
              prefix="${key%-*}"
              numraw="${key##*-}"
              if { [ "$prefix" = "control-plane" ] || [ "$prefix" = "worker" ]; } \
                 && printf '%s' "$numraw" | grep -Eq '^[0-9]+$'; then
                norm=$(printf '%s-%02d' "$prefix" "$((10#$numraw))")
                addr="module.servers.hcloud_server.main[\"$norm\"]"
                if terraform -chdir="$TF_DIR" state list 2>/dev/null | grep -qxF "$addr"; then
                  replace_args+=("-replace=$addr")
                  echo "replace_nodes: will force-replace $norm ($addr)" >> "$GITHUB_STEP_SUMMARY"
                else
                  echo "replace_nodes: '$key' -> $addr not found in state; skipping" | tee -a "$GITHUB_STEP_SUMMARY"
                fi
              else
                echo "replace_nodes: ignoring invalid entry '$key' (expected worker-N or control-plane-N)" | tee -a "$GITHUB_STEP_SUMMARY"
              fi
            done <<< "$requested"
          fi

          terraform -chdir="$TF_DIR" plan "${replace_args[@]}" -out="$RUNNER_TEMP/tfplan"

      - name: Guard control-plane replacements
        env:
          ALLOW_CONTROL_PLANE_REPLACEMENT: ${{ inputs.allow_control_plane_replacement && 'true' || 'false' }}
        run: |
          terraform -chdir="$TF_DIR" show -json "$RUNNER_TEMP/tfplan" > "$RUNNER_TEMP/tfplan.json"

          CONTROL_PLANE_CHANGES=$(jq -r '
            .resource_changes[]
            | select(.address | test("module\\.servers\\.hcloud_server\\.main\\[\\\"control-plane-"))
            | select(.change.actions | index("delete"))
            | .address
          ' "$RUNNER_TEMP/tfplan.json")

          if [ -n "$CONTROL_PLANE_CHANGES" ] && [ "$ALLOW_CONTROL_PLANE_REPLACEMENT" != "true" ]; then
            {
              echo "Refusing to apply because Terraform plans to replace or delete control-plane servers:"
              echo
              printf '%s\n' "$CONTROL_PLANE_CHANGES"
              echo
              echo "Use the normal workflow for non-disruptive infra changes."
              echo "Routine control-plane replacement is not a supported operation in this bootstrap model."
              echo "Treat control-plane replacement as deliberate recovery or migration work, not a normal Infra Up run."
              echo "If this run is intentional, re-run Infra Up with allow_control_plane_replacement=true only after confirming the recovery plan."
            } | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Terraform apply
        run: terraform -chdir="$TF_DIR" apply -auto-approve "$RUNNER_TEMP/tfplan"

      - name: Ensure servers are powered on
        run: ./scripts/github/hcloud-server-power.sh poweron

      - name: Wait for Kubernetes API to become ready
        env:
          RESTORE_FROM_S3: ${{ inputs.restore_from_s3 && 'true' || 'false' }}
        run: |
          # Resolve the API endpoint Terraform produced and probe /livez until
          # it responds OK. This catches cloud-init failures (private NIC
          # missing, S3 restore failing, etc.) before the workflow reports
          # success, so the operator does not have to SSH to find out.
          API_ENDPOINT=$(terraform -chdir="$TF_DIR" output -raw api_server_endpoint)
          case "$API_ENDPOINT" in
            http://*|https://*) ;;
            *) API_ENDPOINT="https://$API_ENDPOINT" ;;
          esac

          # cloud-init has to apt-update, apt-upgrade, install k3s, bring up
          # the private NIC, and (in restore mode) download the snapshot and
          # run cluster-reset before k3s starts. Allow extra slack on restore.
          if [ "$RESTORE_FROM_S3" = "true" ]; then
            DEADLINE=$(( $(date +%s) + 900 ))   # 15 min
          else
            DEADLINE=$(( $(date +%s) + 600 ))   # 10 min
          fi

          last_status=""
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            status=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 5 "$API_ENDPOINT/livez" 2>/dev/null || echo "000")
            if [ "$status" = "200" ] || [ "$status" = "401" ] || [ "$status" = "403" ]; then
              # 200 = healthy, 401/403 = healthy but unauthenticated (we did
              # not present client certs). Either way TLS works and the API
              # server is up.
              echo "API ready: HTTP $status from $API_ENDPOINT/livez" | tee -a "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            if [ "$status" != "$last_status" ]; then
              echo "$(date -u '+%H:%M:%SZ') $API_ENDPOINT/livez -> HTTP $status"
              last_status="$status"
            fi
            sleep 10
          done

          {
            echo "Kubernetes API did not become ready in time."
            echo "Endpoint: $API_ENDPOINT/livez"
            echo "Last HTTP status: $last_status"
            echo
            echo "Likely causes:"
            echo "  - cloud-init failed on the bootstrap control plane (check Hetzner console for cp-01)"
            echo "  - private NIC did not come up (k3s cannot bind --node-ip)"
            echo "  - S3 snapshot restore failed (wrong filename, bad creds, k3s 1.35.x doubled-path bug)"
          } | tee -a "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Show endpoint summary
        run: |
          echo "API endpoint: $(terraform -chdir="$TF_DIR" output -raw api_server_endpoint)" >> "$GITHUB_STEP_SUMMARY"
          echo "API LB IP: $(terraform -chdir="$TF_DIR" output -raw api_load_balancer_ip)" >> "$GITHUB_STEP_SUMMARY"
          echo "Control planes: $(terraform -chdir="$TF_DIR" output -json control_plane_public_ips | jq length)" >> "$GITHUB_STEP_SUMMARY"
          echo "Workers: $(terraform -chdir="$TF_DIR" output -json worker_public_ips | jq length)" >> "$GITHUB_STEP_SUMMARY"
