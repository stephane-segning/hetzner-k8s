name: Rotate Control Plane

on:
  workflow_dispatch:
    inputs:
      node_key:
        description: Control-plane Terraform key to replace, for example control-plane-01
        required: true
        type: string
      confirm_node_key:
        description: Re-enter the same node key to confirm the replacement
        required: true
        type: string
      allow_bootstrap_control_plane_replacement:
        description: Allow replacement of control-plane-01, which is the cluster-init node and can bootstrap a new cluster
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: hetzner-prod-control-plane-rotation
  cancel-in-progress: false

jobs:
  rotate:
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      TF_DIR: terraform/envs/prod
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_cluster_name: ${{ vars.TF_CLUSTER_NAME || 'hetzner-k8s' }}
      TF_VAR_control_plane_server_type: ${{ vars.TF_CONTROL_PLANE_SERVER_TYPE || 'cpx22' }}
      TF_VAR_worker_server_type: ${{ vars.TF_WORKER_SERVER_TYPE || 'cpx42' }}
      TF_VAR_control_plane_count: ${{ vars.TF_CONTROL_PLANE_COUNT || '3' }}
      TF_VAR_worker_count: ${{ vars.TF_WORKER_COUNT || '2' }}
      TF_VAR_location: ${{ vars.TF_LOCATION || 'nbg1' }}
      TF_VAR_ssh_key_ids: ${{ vars.TF_SSH_KEY_IDS || '[]' }}
      TF_VAR_api_load_balancer_type: ${{ vars.TF_API_LOAD_BALANCER_TYPE || 'lb11' }}
      TF_VAR_api_server_hostname: ${{ vars.TF_API_SERVER_HOSTNAME || '' }}
      TF_VAR_etcd_snapshot_schedule_cron: ${{ vars.TF_ETCD_SNAPSHOT_SCHEDULE_CRON || '0 */6 * * *' }}
      TF_VAR_etcd_snapshot_retention: ${{ vars.TF_ETCD_SNAPSHOT_RETENTION || '14' }}
      TF_VAR_etcd_snapshot_compress: ${{ vars.TF_ETCD_SNAPSHOT_COMPRESS || 'true' }}
      TF_VAR_etcd_s3_enabled: ${{ vars.TF_ETCD_S3_ENABLED || 'true' }}
      TF_VAR_etcd_s3_config_secret_name: ${{ vars.TF_ETCD_S3_CONFIG_SECRET_NAME || 'k3s-etcd-snapshot-s3-config' }}
      TF_VAR_oidc_issuer_url: ${{ vars.TF_OIDC_ISSUER_URL || '' }}
      TF_VAR_oidc_client_id: ${{ vars.TF_OIDC_CLIENT_ID || 'kubernetes' }}
      TF_VAR_oidc_username_claim: ${{ vars.TF_OIDC_USERNAME_CLAIM || 'preferred_username' }}
      TF_VAR_oidc_groups_claim: ${{ vars.TF_OIDC_GROUPS_CLAIM || 'groups' }}
      TF_VAR_oidc_username_prefix: ${{ vars.TF_OIDC_USERNAME_PREFIX || '-' }}
      TF_VAR_oidc_groups_prefix: ${{ vars.TF_OIDC_GROUPS_PREFIX || '' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-central
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Validate workflow input
        env:
          NODE_KEY: ${{ inputs.node_key }}
          CONFIRM_NODE_KEY: ${{ inputs.confirm_node_key }}
          ALLOW_BOOTSTRAP_CONTROL_PLANE_REPLACEMENT: ${{ inputs.allow_bootstrap_control_plane_replacement && 'true' || 'false' }}
        run: |
          if [ "$NODE_KEY" != "$CONFIRM_NODE_KEY" ]; then
            echo "node_key and confirm_node_key must match" >&2
            exit 1
          fi

          case "$NODE_KEY" in
            control-plane-*) ;;
            *)
              echo "node_key must start with control-plane-" >&2
              exit 1
              ;;
          esac

          if [ "$NODE_KEY" = "control-plane-01" ] && [ "$ALLOW_BOOTSTRAP_CONTROL_PLANE_REPLACEMENT" != "true" ]; then
            cat >&2 <<'EOF'
control-plane-01 is the bootstrap cluster-init node in this repository.
Replacing it through Terraform/cloud-init can start a fresh single-node cluster and break the existing control-plane.
Use control-plane-02 and control-plane-03 for normal rolling rotation.
If you intentionally need to replace control-plane-01, re-run with allow_bootstrap_control_plane_replacement=true.
EOF
            exit 1
          fi

      - name: Write backend config
        run: |
          BACKEND_ENDPOINT='${{ secrets.TF_STATE_ENDPOINT }}'

          if [ -z "$BACKEND_ENDPOINT" ]; then
            echo "TF_STATE_ENDPOINT is empty" >&2
            exit 1
          fi

          case "$BACKEND_ENDPOINT" in
            http://*|https://*) ;;
            *) BACKEND_ENDPOINT="https://$BACKEND_ENDPOINT" ;;
          esac

          cat > backend.hcl <<EOF
          bucket = "${{ secrets.TF_STATE_BUCKET }}"
          key    = "${{ secrets.TF_STATE_KEY }}"
          region = "eu-central"
          endpoints = {
            s3 = "$BACKEND_ENDPOINT"
          }
          skip_requesting_account_id = true
          skip_credentials_validation = true
          skip_metadata_api_check = true
          skip_region_validation = true
          use_path_style = true
          skip_s3_checksum = true
          EOF

      - name: Terraform init
        run: terraform -chdir="$TF_DIR" init -reconfigure -backend-config="$GITHUB_WORKSPACE/backend.hcl"

      - name: Terraform validate
        run: terraform -chdir="$TF_DIR" validate

      - name: Terraform plan single control-plane replacement
        env:
          NODE_KEY: ${{ inputs.node_key }}
        run: |
          terraform -chdir="$TF_DIR" plan \
            -out="$RUNNER_TEMP/tfplan" \
            -replace="module.servers.hcloud_server.main[\"${NODE_KEY}\"]"

      - name: Guard single control-plane replacement
        env:
          NODE_KEY: ${{ inputs.node_key }}
        run: |
          terraform -chdir="$TF_DIR" show -json "$RUNNER_TEMP/tfplan" > "$RUNNER_TEMP/tfplan.json"

          EXPECTED_ADDRESS="module.servers.hcloud_server.main[\"${NODE_KEY}\"]"
          CONTROL_PLANE_CHANGES=$(jq -r '
            .resource_changes[]
            | select(.address | test("module\\.servers\\.hcloud_server\\.main\\[\\\"control-plane-"))
            | select(.change.actions | index("delete"))
            | .address
          ' "$RUNNER_TEMP/tfplan.json")

          if [ -z "$CONTROL_PLANE_CHANGES" ]; then
            echo "No control-plane replacement was planned" >&2
            exit 1
          fi

          UNEXPECTED_CHANGES=$(printf '%s\n' "$CONTROL_PLANE_CHANGES" | grep -Fvx "$EXPECTED_ADDRESS" || true)
          if [ -n "$UNEXPECTED_CHANGES" ]; then
            {
              echo "Plan would replace additional control-plane nodes beyond $NODE_KEY:"
              echo
              printf '%s\n' "$UNEXPECTED_CHANGES"
            } | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          CHANGE_COUNT=$(printf '%s\n' "$CONTROL_PLANE_CHANGES" | sed '/^$/d' | wc -l | tr -d ' ')
          if [ "$CHANGE_COUNT" != "1" ]; then
            {
              echo "Expected exactly one control-plane replacement, found $CHANGE_COUNT:"
              echo
              printf '%s\n' "$CONTROL_PLANE_CHANGES"
            } | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Terraform apply single control-plane replacement
        run: terraform -chdir="$TF_DIR" apply -auto-approve "$RUNNER_TEMP/tfplan"

      - name: Ensure servers are powered on
        run: ./scripts/github/hcloud-server-power.sh poweron

      - name: Show rotation summary
        env:
          NODE_KEY: ${{ inputs.node_key }}
        run: |
          echo "Rotated control plane: $NODE_KEY" >> "$GITHUB_STEP_SUMMARY"
          echo "API endpoint: $(terraform -chdir="$TF_DIR" output -raw api_server_endpoint)" >> "$GITHUB_STEP_SUMMARY"
          echo "Control planes: $(terraform -chdir="$TF_DIR" output -json control_plane_public_ips | jq length)" >> "$GITHUB_STEP_SUMMARY"
          echo "Workers: $(terraform -chdir="$TF_DIR" output -json worker_public_ips | jq length)" >> "$GITHUB_STEP_SUMMARY"
