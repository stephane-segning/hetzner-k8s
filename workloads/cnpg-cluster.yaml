apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: app-db
  namespace: data
spec:
  instances: 3
  
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "128MB"
      
  bootstrap:
    initdb:
      database: appdb
      owner: appuser
      
  storage:
    size: 10Gi
    storageClass: hcloud-volumes
    
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
      
  monitoring:
    enablePodMonitor: false
